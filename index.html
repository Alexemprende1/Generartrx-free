<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRX Miner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: linear-gradient(#0f172a, #1e2937);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .coin { font-size: 100px; margin: 20px; }
    .balance { font-size: 28px; color: #22ff88; margin: 10px; }
    .timer { font-size: 40px; color: #00ffff; font-weight: bold; margin: 15px; }
    button { 
      background: #22ff88; 
      color: black; 
      border: none; 
      padding: 15px 30px; 
      margin: 10px; 
      font-size: 18px; 
      border-radius: 50px; 
      width: 80%; 
    }
    button:disabled { background: #555; color: #ccc; }
  </style>
</head>
<body>
  <h2>🔥 TRX MINER</h2>
  <h1>Generador de TRX</h1>
  
  <div class="coin">💎</div>
  
  <h2 class="balance" id="balance">0.000000 TRX</h2>
  
  <div class="timer" id="timer">06:00:00</div>
  <p id="status">Cargando...</p>
  
  <button id="claimBtn" onclick="claim()">💎 Reclamar TRX</button>
  <button onclick="Telegram.WebApp.close()">Cerrar</button>

  <script>
    let balance = 0;
    const CLAIM_TIME = 6 * 60 * 60 * 1000; // 6 horas
    const CLAIM_AMOUNT = 0.5; // Cantidad por reclamo

    function loadData() {
      balance = parseFloat(localStorage.getItem('trx_balance')) || 0;
      document.getElementById("balance").innerText = balance.toFixed(6) + " TRX";

      const lastClaim = localStorage.getItem('lastClaim');
      if (lastClaim) {
        updateTimer(parseInt(lastClaim));
      } else {
        document.getElementById("timer").innerText = "06:00:00";
        document.getElementById("status").innerText = "¡Listo para reclamar!";
        document.getElementById("claimBtn").disabled = false;
      }
    }

    function updateTimer(lastClaimTime) {
      const timerEl = document.getElementById("timer");
      const statusEl = document.getElementById("status");
      const claimBtn = document.getElementById("claimBtn");

      setInterval(() => {
        const now = Date.now();
        const remaining = CLAIM_TIME - (now - lastClaimTime);

        if (remaining <= 0) {
          timerEl.innerText = "06:00:00";
          statusEl.innerText = "¡Listo para reclamar!";
          claimBtn.disabled = false;
          return;
        }

        const hours = Math.floor(remaining / (1000*60*60));
        const minutes = Math.floor((remaining % (1000*60*60)) / (1000*60));
        const seconds = Math.floor((remaining % (1000*60)) / 1000);

        timerEl.innerText = `\( {hours.toString().padStart(2,'0')}: \){minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        statusEl.innerText = "El minero está activo...";
        claimBtn.disabled = true;
      }, 1000);
    }

    function claim() {
      balance += CLAIM_AMOUNT;
      const now = Date.now();

      localStorage.setItem('trx_balance', balance);
      localStorage.setItem('lastClaim', now);

      document.getElementById("balance").innerText = balance.toFixed(6) + " TRX";
      Telegram.WebApp.showAlert(`✅ Reclamaste ${CLAIM_AMOUNT} TRX`);

      updateTimer(now); // Reinicia contador
    }

    window.onload = loadData;
  </script>
</body>
</html>
