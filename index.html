<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador TRX</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: linear-gradient(#1a1a2e, #16213e);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .coin { font-size: 110px; margin: 15px; animation: spin 8s linear infinite; }
    .balance { font-size: 34px; color: #00ff9d; margin: 10px; }
    .timer { font-size: 46px; color: #00ffff; font-weight: bold; margin: 12px; }
    button { 
      background: #00ff9d; 
      color: black; 
      border: none; 
      padding: 16px 30px; 
      margin: 10px; 
      font-size: 18px; 
      border-radius: 50px; 
      width: 85%; 
    }
    button:disabled { background: #555; color: #aaa; }
    .rate { font-size: 18px; color: #ffd700; margin: 8px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h2>🔥 TRX MINER</h2>
  <h1>Generador de TRX</h1>
  
  <div class="coin">💎</div>
  
  <h2 class="balance" id="balance">0.000000 TRX</h2>
  <p class="rate" id="rate">Velocidad: 0.0000 TRX / minuto</p>
  
  <div class="timer" id="timer">06:00:00</div>
  <p id="status">El minero está trabajando...</p>
  
  <button id="claimBtn" onclick="claim()">💎 Reclamar TRX</button>
  <button onclick="Telegram.WebApp.close()">Cerrar</button>

  <script>
    let balance = 0;
    const CLAIM_TIME = 6 * 60 * 60 * 1000; // 6 horas
    const CLAIM_AMOUNT = 0.5; // Cantidad que se reclama cada 6 horas (cámbialo si quieres)

    function loadData() {
      balance = parseFloat(localStorage.getItem('trx_balance')) || 0;
      document.getElementById("balance").innerText = balance.toFixed(6) + " TRX";

      const lastClaim = localStorage.getItem('lastClaim');
      if (lastClaim) {
        updateTimer(parseInt(lastClaim));
      } else {
        document.getElementById("claimBtn").disabled = false;
        document.getElementById("status").innerText = "¡Listo para reclamar!";
      }
    }

    function updateTimer(lastClaimTime) {
      const timerEl = document.getElementById("timer");
      const statusEl = document.getElementById("status");
      const claimBtn = document.getElementById("claimBtn");

      setInterval(() => {
        const now = Date.now();
        const elapsed = now - lastClaimTime;
        const remaining = CLAIM_TIME - elapsed;

        if (remaining <= 0) {
          timerEl.innerText = "06:00:00";
          statusEl.innerText = "¡Listo para reclamar!";
          claimBtn.disabled = false;
          return;
        }

        const hours = Math.floor(remaining / (1000*60*60));
        const minutes = Math.floor((remaining % (1000*60*60)) / (1000*60));
        const seconds = Math.floor((remaining % (1000*60)) / 1000);

        timerEl.innerText = `\( {hours.toString().padStart(2,'0')}: \){minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        statusEl.innerText = "El minero está trabajando...";
        claimBtn.disabled = true;
      }, 1000);
    }

    function claim() {
      balance += CLAIM_AMOUNT;
      const now = Date.now();

      localStorage.setItem('trx_balance', balance);
      localStorage.setItem('lastClaim', now);

      document.getElementById("balance").innerText = balance.toFixed(6) + " TRX";
      Telegram.WebApp.showAlert(`✅ ¡Reclamaste ${CLAIM_AMOUNT} TRX!`);

      updateTimer(now); // Reinicia el contador
    }

    window.onload = loadData;
  </script>
</body>
</html>
