<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON Miner - Telegram Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: white;
        }
        .tron-glow { text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff; }
        .mining-btn { transition: all 0.4s ease; }
        .balance { font-size: 3.2rem; font-weight: 700; }
        .particle {
            position: absolute; width: 8px; height: 8px; background: #00f0ff;
            border-radius: 50%; pointer-events: none; animation: particleAnim 2s forwards;
        }
        @keyframes particleAnim {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0) translateY(-180px); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-md mx-auto bg-black/90 min-h-screen">
        <!-- Header -->
        <div class="bg-gradient-to-r from-cyan-500 to-blue-600 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-3xl">₿</div>
                <div>
                    <h1 class="text-2xl font-bold tron-glow">TRON MINER</h1>
                    <p class="text-xs text-cyan-100">Reclama cada 3 minutos</p>
                </div>
            </div>
            <div class="text-right">
                <div id="trxPrice" class="text-sm font-bold text-white">$0.00</div>
                <div class="text-[10px] text-cyan-100">TRX USD</div>
            </div>
        </div>

        <!-- Balance -->
        <div class="p-6">
            <div class="bg-zinc-900 rounded-3xl p-8 text-center border border-cyan-500/30">
                <p class="text-cyan-400 text-sm font-medium">TU BALANCE</p>
                <div id="balance" class="balance text-white mt-3">0.000</div>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-4xl">₮</span>
                    <span class="text-2xl text-cyan-300">TRX</span>
                </div>
                <div id="balanceUSD" class="text-emerald-400 text-lg font-medium mt-2">$0.00</div>
            </div>

            <!-- Mining Button -->
            <div class="mt-8">
                <button id="mineBtn" 
                        class="mining-btn w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold text-xl py-8 rounded-3xl flex flex-col items-center justify-center shadow-2xl shadow-cyan-500/50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i id="mineIcon" class="fas fa-bolt text-5xl mb-4"></i>
                    <span id="mineText">RECLAMAR 0.001 TRX</span>
                    <span id="countdownText" class="text-sm mt-3 opacity-90 hidden"></span>
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-zinc-900/70 rounded-2xl p-5">
                    <p class="text-xs text-zinc-400">Total Minado</p>
                    <div id="totalMined" class="text-3xl font-bold mt-1">0.000</div>
                </div>
                <div class="bg-zinc-900/70 rounded-2xl p-5">
                    <p class="text-xs text-zinc-400">Valor Actual</p>
                    <div id="totalUSD" class="text-3xl font-bold text-emerald-400 mt-1">$0.00</div>
                </div>
            </div>
        </div>

        <!-- Withdraw -->
        <div class="px-6 mt-6">
            <div class="bg-zinc-900 rounded-3xl p-6 border border-amber-400/30">
                <h3 class="font-semibold text-lg flex items-center gap-2 mb-4">
                    <i class="fas fa-wallet"></i> Retirar Fondos
                </h3>
                <input id="withdrawAddress" type="text" placeholder="Dirección TRON (TRC20)" 
                       class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:border-cyan-400 focus:outline-none">
                <button id="withdrawBtn" 
                        class="mt-4 w-full bg-gradient-to-r from-amber-500 to-yellow-600 py-5 rounded-2xl font-bold text-lg">
                    RETIRAR TODO
                </button>
            </div>
        </div>

        <div class="px-6 mt-8 text-center text-xs text-zinc-500">
            Precio en tiempo real vía CoinGecko • Cada clic = 0.001 TRX
        </div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('tronBalance')) || 0;
        let totalMined = parseFloat(localStorage.getItem('totalMined')) || 0;
        let lastClaimTime = parseInt(localStorage.getItem('lastClaimTime')) || 0;
        let trxPrice = 0;

        const REWARD = 0.001;
        const COOLDOWN = 3 * 60 * 1000;

        const balanceEl = document.getElementById('balance');
        const totalMinedEl = document.getElementById('totalMined');
        const balanceUSDEl = document.getElementById('balanceUSD');
        const totalUSDEl = document.getElementById('totalUSD');
        const priceEl = document.getElementById('trxPrice');
        const mineBtn = document.getElementById('mineBtn');
        const mineText = document.getElementById('mineText');
        const countdownText = document.getElementById('countdownText');
        const withdrawBtn = document.getElementById('withdrawBtn');

        let countdownInterval = null;

        function updateUI() {
            balanceEl.textContent = balance.toFixed(3);
            totalMinedEl.textContent = totalMined.toFixed(3);
            
            if (trxPrice > 0) {
                const usdBalance = (balance * trxPrice).toFixed(2);
                const usdTotal = (totalMined * trxPrice).toFixed(2);
                balanceUSDEl.textContent = `≈ $${usdBalance}`;
                totalUSDEl.textContent = `$${usdTotal}`;
            }
        }

        async function fetchTRXPrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tron&vs_currencies=usd');
                const data = await res.json();
                trxPrice = data.tron.usd;
                
                priceEl.textContent = `$${trxPrice.toFixed(4)}`;
                updateUI();
            } catch (e) {
                console.error("Error fetching price", e);
                priceEl.textContent = "$0.32";
            }
        }

        function createParticles(count) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * window.innerWidth + 'px';
                p.style.top = (window.innerHeight * 0.35) + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2200);
            }
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownText.classList.remove('hidden');
            mineBtn.disabled = true;

            function updateTimer() {
                const remaining = lastClaimTime + COOLDOWN - Date.now();
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    mineBtn.disabled = false;
                    countdownText.classList.add('hidden');
                    mineText.textContent = "RECLAMAR 0.001 TRX";
                    return;
                }
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                countdownText.textContent = `Disponible en ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }

            updateTimer();
            countdownInterval = setInterval(updateTimer, 1000);
        }

        function claimReward() {
            const now = Date.now();
            if (now - lastClaimTime < COOLDOWN) return;

            balance += REWARD;
            totalMined += REWARD;
            lastClaimTime = now;

            localStorage.setItem('tronBalance', balance);
            localStorage.setItem('totalMined', totalMined);
            localStorage.setItem('lastClaimTime', lastClaimTime);

            updateUI();
            createParticles(35);

            mineText.textContent = "+0.001 TRX!";
            mineBtn.classList.add('!bg-emerald-600');
            
            setTimeout(() => {
                mineText.textContent = "RECLAMAR 0.001 TRX";
                mineBtn.classList.remove('!bg-emerald-600');
                startCountdown();
            }, 1400);
        }

        function withdraw() {
            if (balance < 1) {
                alert("❌ Mínimo para retirar: 1 TRX");
                return;
            }
            const address = document.getElementById('withdrawAddress').value.trim();
            if (address.length < 30) {
                alert("❌ Ingresa una dirección TRON válida");
                return;
            }
            if (confirm(`¿Retirar ${balance.toFixed(3)} TRX (≈ $${(balance * trxPrice).toFixed(2)})?`)) {
                alert(`✅ ¡Retiro solicitado exitosamente!`);
                balance = 0;
                localStorage.setItem('tronBalance', balance);
                updateUI();
            }
        }

        function init() {
            updateUI();
            fetchTRXPrice();

            // Actualizar precio cada 60 segundos
            setInterval(fetchTRXPrice, 60000);

            // Restaurar cooldown
            const now = Date.now();
            if (now - lastClaimTime < COOLDOWN) {
                startCountdown();
            }

            mineBtn.addEventListener('click', claimReward);
            withdrawBtn.addEventListener('click', withdraw);
        }

        window.onload = init;
    </script>
</body>
</html>
