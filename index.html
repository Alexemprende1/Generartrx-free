<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRX Miner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: #0f172a; color: white; font-family: Arial; text-align: center; padding: 20px; }
    h1 { color: #22ff88; }
    .balance { font-size: 32px; color: #22ff88; }
    .timer { font-size: 45px; color: #00ffff; font-weight: bold; }
    button { 
      background: #22ff88; color: black; border: none; 
      padding: 15px; margin: 10px; font-size: 18px; 
      border-radius: 50px; width: 80%; 
    }
  </style>
</head>
<body>
  <h2>🔥 TRX MINER</h2>
  <h1>Generador de TRX</h1>
  
  <div style="font-size:100px;">💎</div>
  
  <div class="balance" id="balance">0.000000 TRX</div>
  
  <div class="timer" id="timer">06:00:00</div>
  <p id="status">Cargando...</p>
  
  <button id="claimBtn" onclick="claim()">💎 Reclamar TRX</button>
  <button onclick="Telegram.WebApp.close()">Cerrar</button>

  <script>
    let balance = 0;
    const CLAIM_TIME = 6*60*60*1000;
    const CLAIM_AMOUNT = 0.5;

    function loadData() {
      balance = parseFloat(localStorage.getItem('balance')) || 0;
      document.getElementById("balance").innerText = balance.toFixed(6) + " TRX";

      const last = localStorage.getItem('lastClaim');
      if (last) {
        updateTimer(Number(last));
      } else {
        document.getElementById("claimBtn").disabled = false;
        document.getElementById("status").innerText = "¡Listo para reclamar!";
      }
    }

    function updateTimer(lastTime) {
      setInterval(() => {
        const remaining = CLAIM_TIME - (Date.now() - lastTime);
        const timerEl = document.getElementById("timer");

        if (remaining <= 0) {
          timerEl.innerText = "06:00:00";
          document.getElementById("status").innerText = "¡Listo para reclamar!";
          document.getElementById("claimBtn").disabled = false;
          return;
        }

        const h = Math.floor(remaining / 3600000);
        const m = Math.floor((remaining % 3600000) / 60000);
        const s = Math.floor((remaining % 60000) / 1000);

        timerEl.innerText = `\( {h.toString().padStart(2,'0')}: \){m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      }, 1000);
    }

    function claim() {
      balance += CLAIM_AMOUNT;
      const now = Date.now();
      localStorage.setItem('balance', balance);
      localStorage.setItem('lastClaim', now);

      document.getElementById("balance").innerText = balance.toFixed(6) + " TRX";
      Telegram.WebApp.showAlert("✅ Reclamaste " + CLAIM_AMOUNT + " TRX");

      updateTimer(now);
    }

    window.onload = loadData;
  </script>
</body>
</html>
