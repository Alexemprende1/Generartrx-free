<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON Miner - Telegram Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: white;
        }
        .tron-glow { text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff; }
        .mining-btn { transition: all 0.3s ease; }
        .mining-btn:active { transform: scale(0.95); }
        .balance { font-size: 3rem; font-weight: 700; }
        .particle {
            position: absolute; width: 6px; height: 6px;
            background: #00f0ff; border-radius: 50%;
            pointer-events: none; animation: particleAnim 1.5s forwards;
        }
        @keyframes particleAnim {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0) translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-md mx-auto bg-black/80 min-h-screen">
        <!-- Header -->
        <div class="bg-gradient-to-r from-cyan-500 to-blue-600 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-2xl">₿</div>
                <div>
                    <h1 class="text-2xl font-bold tron-glow">TRON MINER</h1>
                    <p class="text-xs text-cyan-100">TRX Mining Bot</p>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs opacity-75">Telegram Mini App</div>
                <div class="flex items-center gap-1 text-xs">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <span>En línea</span>
                </div>
            </div>
        </div>

        <!-- Balance -->
        <div class="p-6">
            <div class="bg-zinc-900 rounded-3xl p-8 text-center border border-cyan-500/30">
                <p class="text-cyan-400 text-sm font-medium tracking-widest">TU BALANCE</p>
                <div id="balance" class="balance text-white mt-2">0.000</div>
                <div class="flex items-center justify-center gap-2 mt-1">
                    <span class="text-3xl">₮</span>
                    <span class="text-xl text-cyan-300 font-semibold">TRX</span>
                </div>
            </div>

            <!-- Mining Button -->
            <div class="mt-8">
                <button id="mineBtn" class="mining-btn w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold text-xl py-8 rounded-3xl flex flex-col items-center justify-center shadow-2xl shadow-cyan-500/50 disabled:opacity-50">
                    <i class="fas fa-bolt text-4xl mb-3"></i>
                    <span id="mineText">VER ANUNCIO Y MINAR TRX</span>
                    <span id="cooldownText" class="text-sm mt-2 opacity-75 hidden"></span>
                </button>
                <p class="text-center text-xs text-zinc-500 mt-4">Ver anuncio = <span class="text-emerald-400 font-bold">0.001 TRX</span></p>
            </div>

            <!-- Referidos Button -->
            <div class="mt-4">
                <button id="referBtn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-6 rounded-3xl font-bold text-lg flex items-center justify-center gap-3 hover:brightness-110">
                    <i class="fas fa-user-plus"></i>
                    INVITAR AMIGOS
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-zinc-900/70 rounded-2xl p-5">
                    <p class="text-xs text-zinc-400">Minados hoy</p>
                    <div id="todayMined" class="text-2xl font-bold text-emerald-400">0.000</div>
                </div>
                <div class="bg-zinc-900/70 rounded-2xl p-5">
                    <p class="text-xs text-zinc-400">Total minado</p>
                    <div id="totalMined" class="text-2xl font-bold">0.000</div>
                </div>
            </div>
        </div>

        <!-- Referidos Section -->
        <div class="px-6 mt-6">
            <div class="bg-zinc-900 rounded-3xl p-6 border border-purple-400/30">
                <h3 class="font-semibold text-lg flex items-center gap-2 mb-4">
                    <i class="fas fa-users"></i> Mis Referidos
                </h3>
                <div id="referralLink" class="bg-black p-4 rounded-2xl text-sm break-all mb-3"></div>
                <button onclick="copyReferralLink()" class="w-full bg-purple-600 py-3 rounded-2xl font-medium">Copiar Enlace de Invitación</button>
            </div>
        </div>

        <!-- Withdraw Section -->
        <div class="px-6 mt-6">
            <div class="bg-zinc-900 rounded-3xl p-6 border border-amber-400/30">
                <h3 class="font-semibold text-lg flex items-center gap-2"><i class="fas fa-wallet"></i> Retirar fondos</h3>
                <input id="withdrawAddress" type="text" placeholder="Tu dirección TRON (TRC20)" class="w-full mt-4 bg-black border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-cyan-400">
                <button id="withdrawBtn" class="mt-4 w-full bg-gradient-to-r from-amber-500 to-yellow-600 py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">RETIRAR TODO</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-zinc-950 border-t border-zinc-800 p-3 text-center text-xs text-zinc-500">
            TRON Miner • Powered by AdsGram + Supabase
        </div>
    </div>

    <script>
        // ==================== CONFIGURACIÓN SUPABASE ====================
        const SUPABASE_URL = "https://gmyysxuszqwhsbuglvos.supabase.co/rest/v1/";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXlzeHVzenF3aHNidWdsdm9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3ODExOTQsImV4cCI6MjA5NjM1NzE5NH0.C-1TCD8BG-GJtJl6hxJGmo60rqyNee4Q_bsEebRIveQ";

        let currentUser = null;
        let telegramUserId = null;

        // ==================== VARIABLES DEL JUEGO ====================
        let balance = 0;
        let totalMined = 0;
        let lastMineTime = 0;
        let history = [];
        const COOLDOWN = 3 * 60 * 1000;

        // AdsGram
        let AdController;

        // Elementos DOM
        const balanceEl = document.getElementById('balance');
        const totalMinedEl = document.getElementById('totalMined');
        const todayMinedEl = document.getElementById('todayMined');
        const mineBtn = document.getElementById('mineBtn');
        const mineText = document.getElementById('mineText');
        const cooldownText = document.getElementById('cooldownText');
        const referBtn = document.getElementById('referBtn');

        // ==================== FUNCIONES SUPABASE ====================
        async function supabaseRequest(endpoint, method = "GET", body = null) {
            const headers = {
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            };

            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);

            const res = await fetch(SUPABASE_URL + endpoint, options);
            return res.json();
        }

        async function initUser() {
            // Obtener datos de Telegram Mini App
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                const user = window.Telegram.WebApp.initDataUnsafe.user;
                if (user) telegramUserId = user.id;
            }

            if (!telegramUserId) {
                telegramUserId = 123456789; // ID de prueba si no está en Telegram
            }

            // Buscar o crear usuario
            let users = await supabaseRequest(`users?telegram_id=eq.${telegramUserId}`);
            
            if (users.length > 0) {
                currentUser = users[0];
            } else {
                const newUser = {
                    telegram_id: telegramUserId,
                    username: window.Telegram?.WebApp?.initDataUnsafe?.user?.username || "user_" + telegramUserId,
                    balance: 0,
                    total_mined: 0,
                    referrals_count: 0,
                    referred_by: null
                };
                const created = await supabaseRequest("users", "POST", newUser);
                currentUser = created[0];
            }

            balance = currentUser.balance || 0;
            totalMined = currentUser.total_mined || 0;
            updateUI();
        }

        async function saveToSupabase() {
            if (!currentUser) return;
            await supabaseRequest(`users?telegram_id=eq.${telegramUserId}`, "PATCH", {
                balance: balance,
                total_mined: totalMined
            });
        }

        // ==================== REFERRAL SYSTEM ====================
        function getReferralLink() {
            return `https://t.me/TuBotUsername?start=ref_${telegramUserId}`;
        }

        function copyReferralLink() {
            const link = getReferralLink();
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Enlace copiado:\n" + link);
            });
        }

        // ==================== MINING CON ADSGRAM ====================
        async function mine() {
            // ... (mismo código anterior con AdsGram)
            const now = Date.now();
            if (now - lastMineTime < COOLDOWN) {
                const remaining = Math.ceil((COOLDOWN - (now - lastMineTime)) / 1000);
                showCooldown(remaining);
                return;
            }

            mineText.textContent = "Cargando anuncio...";
            mineBtn.disabled = true;

            try {
                const result = await AdController.show();
                const reward = 0.001;

                balance += reward;
                totalMined += reward;
                lastMineTime = now;

                await saveToSupabase();

                const timeStr = new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
                history.unshift({ amount: reward, time: timeStr });

                updateUI();
                createParticles(30);

                mineText.textContent = '+0.001 TRX!';
                setTimeout(() => mineText.textContent = "VER ANUNCIO Y MINAR TRX", 1500);
            } catch (e) {
                mineText.textContent = "Anuncio no completado";
                setTimeout(() => mineText.textContent = "VER ANUNCIO Y MINAR TRX", 1500);
            } finally {
                mineBtn.disabled = false;
            }
        }

        function showCooldown(seconds) { /* mismo código anterior */ }

        function updateUI() {
            balanceEl.textContent = balance.toFixed(3);
            totalMinedEl.textContent = totalMined.toFixed(3);
            todayMinedEl.textContent = (balance * 0.7).toFixed(3);
            document.getElementById('referralLink').textContent = getReferralLink();
        }

        function createParticles(count) { /* mismo código anterior */ }

        // ==================== INICIALIZACIÓN ====================
        async function init() {
            await initUser();

            AdController = window.Adsgram.init({ blockId: "34341", debug: false });

            const now = Date.now();
            if (now - lastMineTime < COOLDOWN) {
                showCooldown(Math.ceil((COOLDOWN - (now - lastMineTime)) / 1000));
            }

            mineBtn.addEventListener('click', mine);
            referBtn.addEventListener('click', copyReferralLink);

            // Actualizar cada 30 segundos
            setInterval(saveToSupabase, 30000);
        }

        window.onload = init;
    </script>
</body>
</html>
