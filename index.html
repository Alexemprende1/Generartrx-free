<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON Miner - Telegram Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- ADSGRAM -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <!-- SUPABASE CLIENT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0a, #1a1a2e); color: white; }
        .tron-glow { text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff; }
        .mining-btn { transition: all 0.4s ease; }
        .balance { font-size: 3.2rem; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-md mx-auto bg-black/90 min-h-screen">
        <!-- Header -->
        <div class="bg-gradient-to-r from-cyan-500 to-blue-600 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-3xl">₿</div>
                <div>
                    <h1 class="text-2xl font-bold tron-glow">TRON MINER</h1>
                    <p class="text-xs text-cyan-100">Reclama + Referidos</p>
                </div>
            </div>
        </div>

        <!-- Balance -->
        <div class="p-6">
            <div class="bg-zinc-900 rounded-3xl p-8 text-center border border-cyan-500/30">
                <p class="text-cyan-400 text-sm font-medium">TU BALANCE</p>
                <div id="balance" class="balance text-white mt-3">0.000</div>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-4xl">₮</span><span class="text-2xl text-cyan-300">TRX</span>
                </div>
                <div id="balanceUSD" class="text-emerald-400 text-lg font-medium mt-2">$0.00</div>
            </div>

            <!-- Mining Button -->
            <div class="mt-8">
                <button id="mineBtn" class="mining-btn w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold text-xl py-8 rounded-3xl flex flex-col items-center justify-center disabled:opacity-50">
                    <i class="fas fa-bolt text-5xl mb-4"></i>
                    <span id="mineText">RECLAMAR 0.001 TRX</span>
                    <span id="countdownText" class="text-sm mt-3 opacity-90 hidden"></span>
                </button>
            </div>

            <!-- Referral Section -->
            <div class="mt-8 bg-zinc-900 rounded-3xl p-6">
                <h3 class="font-semibold text-lg flex items-center gap-2 mb-4">
                    <i class="fas fa-user-plus"></i> Invita Amigos
                </h3>
                <p class="text-sm text-zinc-400 mb-4">Gana el <span class="text-emerald-400 font-bold">15%</span> de las ganancias de tus referidos</p>
                
                <div id="referralLinkContainer" class="bg-black rounded-2xl p-4 text-sm break-all mb-4"></div>
                
                <button onclick="copyReferralLink()" 
                        class="w-full bg-emerald-600 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-copy"></i> COPIAR ENLACE DE REFERIDO
                </button>
            </div>
        </div>

        <div class="px-6 mt-8 text-center text-xs text-zinc-500">
            Block ID: 34341 • Supabase Conectado
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const SUPABASE_URL = "https://gmyysxuszqwhsbuglvos.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_W6B7ioMCXuXtlwNpbA_8Eg_YR-21p8O";
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const BLOCK_ID = "34341";
        let AdController;
        try { AdController = window.Adsgram.init({ blockId: BLOCK_ID }); } catch(e) {}

        const REWARD = 0.001;
        const COMMISSION_RATE = 0.15; // 15%
        const COOLDOWN = 3 * 60 * 1000;

        let userId = null;
        let referrerId = null;
        let balance = 0;
        let totalMined = 0;
        let lastClaimTime = 0;
        let trxPrice = 0;

        // Elementos
        const mineBtn = document.getElementById('mineBtn');
        const mineText = document.getElementById('mineText');
        const countdownText = document.getElementById('countdownText');
        const balanceEl = document.getElementById('balance');
        const balanceUSDEl = document.getElementById('balanceUSD');
        const referralLinkContainer = document.getElementById('referralLinkContainer');

        // Obtener datos de Telegram
        function getTelegramUser() {
            if (window.Telegram && window.Telegram.WebApp) {
                const initData = window.Telegram.WebApp.initDataUnsafe;
                userId = initData.user ? initData.user.id : null;
                
                // Obtener referrer desde start_param (si viene por enlace de referido)
                const startParam = window.Telegram.WebApp.startParam;
                if (startParam) referrerId = parseInt(startParam);
            }
        }

        async function registerOrUpdateUser() {
            if (!userId) return;
            
            const { data, error } = await supabase
                .from('users')
                .upsert({
                    telegram_id: userId,
                    referrer_id: referrerId || null,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'telegram_id' });
        }

        async function loadUserData() {
            if (!userId) return;
            
            const { data } = await supabase
                .from('users')
                .select('balance, total_mined, last_claim_time')
                .eq('telegram_id', userId)
                .single();
            
            if (data) {
                balance = data.balance || 0;
                totalMined = data.total_mined || 0;
                lastClaimTime = data.last_claim_time ? new Date(data.last_claim_time).getTime() : 0;
            }
            updateUI();
        }

        function updateUI() {
            balanceEl.textContent = balance.toFixed(3);
            if (trxPrice > 0) {
                balanceUSDEl.textContent = `≈ $${(balance * trxPrice).toFixed(2)}`;
            }
        }

        function generateReferralLink() {
            if (!userId) return "https://t.me/TuBot?start=ERROR";
            return `https://t.me/TuBot?start=${userId}`;   // Cambia "TuBot" por el username real de tu bot
        }

        function copyReferralLink() {
            const link = generateReferralLink();
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Enlace de referido copiado!\nCompártelo con tus amigos");
            });
        }

        async function claimReward() {
            const now = Date.now();
            if (now - lastClaimTime < COOLDOWN) return;

            mineText.textContent = "CARGANDO ANUNCIO...";
            mineBtn.disabled = true;

            try {
                if (AdController) await AdController.show();
            } catch (e) { console.log("Ad skipped"); }

            // Dar recompensa principal
            balance += REWARD;
            totalMined += REWARD;
            lastClaimTime = now;

            // Guardar en Supabase
            await supabase
                .from('users')
                .update({
                    balance: balance,
                    total_mined: totalMined,
                    last_claim_time: new Date().toISOString()
                })
                .eq('telegram_id', userId);

            // Dar comisión al referrer si existe
            if (referrerId) {
                await supabase.rpc('add_commission', {
                    ref_id: referrerId,
                    amount: REWARD * COMMISSION_RATE
                });
            }

            updateUI();
            createParticles(30);

            mineText.textContent = "+0.001 TRX!";
            setTimeout(() => {
                mineText.textContent = "RECLAMAR 0.001 TRX";
                startCountdown();
            }, 1500);
        }

        function startCountdown() { /* ... mismo código anterior ... */ }

        function createParticles() { /* ... mismo código anterior ... */ }

        async function init() {
            getTelegramUser();
            if (!userId) {
                alert("Error: No se pudo obtener tu ID de Telegram");
                return;
            }

            await registerOrUpdateUser();
            await loadUserData();

            // Mostrar enlace de referido
            referralLinkContainer.textContent = generateReferralLink();

            // Eventos
            mineBtn.addEventListener('click', claimReward);
        }

        window.onload = init;
    </script>
</body>
</html>
